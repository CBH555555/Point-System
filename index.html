<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Punkte-System für Paare</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --card-bg: #16213e;
      --accent: #e94560;
      --accent2: #0f3460;
      --text: #eee;
      --muted: #ccc;
      --gold: #f0c27b;
      --green: #2ecc71;
      --radius: 16px;
      --shadow: 0 8px 20px rgba(0,0,0,0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
      max-width: 1000px;
      margin: auto;
    }
    h1, h2, h3 { color: var(--accent); margin: 0.5em 0 0.3em; }
    .header {
      display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center;
      background: var(--card-bg); padding: 20px; border-radius: var(--radius);
      box-shadow: var(--shadow); margin-bottom: 20px;
    }
    .konto { font-size: 2.2rem; font-weight: bold; color: var(--gold); }
    button {
      background: var(--accent); color: white; border: none; padding: 10px 18px;
      border-radius: 30px; font-size: 0.95rem; cursor: pointer; transition: 0.2s;
      margin: 4px; font-weight: 600; box-shadow: 0 4px 10px rgba(233,68,96,0.3);
    }
    button:hover { background: #c12f4a; transform: scale(1.02); }
    button:disabled { background: gray; cursor: not-allowed; box-shadow: none; }
    .card {
      background: var(--card-bg); border-radius: var(--radius); padding: 20px;
      margin-bottom: 20px; box-shadow: var(--shadow);
    }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem; }
    th { background: var(--accent2); padding: 12px 8px; text-align: left; color: white; font-weight: 600; }
    td { padding: 10px 8px; border-bottom: 1px solid rgba(255,255,255,0.1); vertical-align: middle; }
    tr:hover { background: rgba(255,255,255,0.05); }
    input, textarea, select {
      background: #2a2a4a; border: 1px solid #444; color: white; border-radius: 6px;
      padding: 6px 10px; font-size: 0.9rem; width: 100%; box-sizing: border-box;
    }
    .editable-cell {
      cursor: text; min-width: 50px; display: inline-block; padding: 2px;
      border-bottom: 1px dashed transparent;
    }
    .editable-cell:hover { border-color: var(--accent); }
    .punkte-badge {
      background: var(--gold); color: #1a1a2e; padding: 3px 10px; border-radius: 20px;
      font-weight: bold; display: inline-block;
    }
    .warning {
      background: #ff6b6b22; border-left: 4px solid #ff6b6b; padding: 10px;
      border-radius: 0 10px 10px 0; margin: 8px 0; font-size: 0.85rem;
    }
    .flex { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .log-entry {
      font-family: monospace; background: #0f346622; padding: 6px; border-radius: 6px;
      margin: 4px 0; font-size: 0.8rem;
    }
    .tab-btn { background: var(--accent2); color: white; box-shadow: none; }
    .tab-btn.active { background: var(--accent); }
    hr { border-color: rgba(255,255,255,0.1); margin: 15px 0; }
    .sync-status { font-size: 0.8rem; color: var(--muted); }
    @media (max-width: 600px) {
      body { padding: 10px; }
      table { font-size: 0.75rem; }
      th, td { padding: 6px 4px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>🔥 Punkte-System</h1>
      <p style="margin:0;">Ehemann sammelt Punkte · Ehefrau bewertet</p>
      <button style="background:#555; font-size:0.8rem;" onclick="manuellSynchronisieren()">🔄 Jetzt synchronisieren</button>
      <span id="syncStatus" class="sync-status"></span>
    </div>
    <div class="konto" id="kontoAnzeige">0 Punkte</div>
  </div>

  <div class="flex" style="margin-bottom: 15px;">
    <button class="tab-btn active" onclick="switchTab('aufgaben')">📋 Aufgaben</button>
    <button class="tab-btn" onclick="switchTab('einloesungen')">🎁 Einlösungen</button>
    <button class="tab-btn" onclick="switchTab('neu')">➕ Neu</button>
    <button class="tab-btn" onclick="switchTab('log')">📜 Verlauf</button>
  </div>

  <div id="tab-aufgaben" class="tab-content card">
    <h2>Aufgaben (Ehemann führt aus, Frau bewertet)</h2>
    <table><thead><tr><th>Aufgabe</th><th>Punkte</th><th>Status</th><th>Aktion</th></tr></thead><tbody id="aufgabenBody"></tbody></table>
  </div>

  <div id="tab-einloesungen" class="tab-content card" style="display:none;">
    <h2>Einlösekatalog (Ehemann wünscht, Punkte abziehen)</h2>
    <table><thead><tr><th>Einlösung</th><th>Kosten</th><th>Notiz</th><th>Aktion</th></tr></thead><tbody id="einloesungenBody"></tbody></table>
  </div>

  <div id="tab-neu" class="tab-content card" style="display:none;">
    <h2>Neuen Eintrag hinzufügen</h2>
    <select id="neuerTyp">
      <option value="aufgabe">Aufgabe (Ehemann sammelt Punkte)</option>
      <option value="einloesung">Einlösung (Ehemann gibt Punkte aus)</option>
    </select><br><br>
    <input type="text" id="neuerText" placeholder="Beschreibung"><br><br>
    <label>Punkte (Richtwert) / Kosten:</label>
    <input type="number" id="neuerPunkte" value="10" min="1"><br><br>
    <button onclick="neuenEintragHinzufuegen()">Speichern</button>
  </div>

  <div id="tab-log" class="tab-content card" style="display:none;">
    <h2>Letzte Aktivitäten</h2>
    <div id="logContainer">Keine Einträge</div>
  </div>

  <script>
    // ==================== KONFIGURATION ====================
    // HIER DEINE ECHTEN DATEN EINTRAGEN:
    const BIN_ID = "DEINE_BIN_ID";          // ← deine Bin‑ID von jsonbin.io
    const MASTER_KEY = "DEIN_MASTER_KEY";  // ← dein Master‑Key von jsonbin.io

    // ==================== DATEN & SYNC ====================
    let lokaleDaten = { aufgaben: [], einloesungen: [], konto: 0, log: [] };
    let aktuelleVersion = null;

    const API_BASE = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
    const HEADERS = {
      "X-Master-Key": MASTER_KEY,
      "Content-Type": "application/json"
    };

    async function datenLaden() {
      try {
        document.getElementById('syncStatus').textContent = ' (lade...)';
        const res = await fetch(`${API_BASE}/latest`, { headers: HEADERS });
        if (!res.ok) throw new Error("Laden fehlgeschlagen");
        const json = await res.json();
        aktuelleVersion = json.record.version;
        const data = json.record;
        if (!data.aufgaben && !data.einloesungen) {
          initialisiereStandardDaten();
          await datenSpeichern(true);
        } else {
          lokaleDaten = data;
        }
        renderAlles();
        document.getElementById('syncStatus').textContent = ' ✅ synchron';
      } catch (e) {
        console.error(e);
        document.getElementById('syncStatus').textContent = ' ❌ Ladefehler';
        renderAlles();
      }
    }

    async function datenSpeichern(initial = false) {
      try {
        if (!initial) {
          const latest = await fetch(`${API_BASE}/latest`, { headers: HEADERS });
          if (latest.ok) {
            const latestData = await latest.json();
            if (latestData.record.version !== aktuelleVersion) {
              alert('⚠️ Die Daten wurden inzwischen auf einem anderen Gerät geändert. Die Seite wird neu geladen.');
              location.reload();
              return;
            }
          }
        }
        const putHeaders = { ...HEADERS };
        if (aktuelleVersion) putHeaders["X-Bin-Version"] = aktuelleVersion;
        const res = await fetch(API_BASE, {
          method: 'PUT',
          headers: putHeaders,
          body: JSON.stringify(lokaleDaten)
        });
        if (!res.ok) throw new Error("Speichern fehlgeschlagen");
        const result = await res.json();
        aktuelleVersion = result.record.version;
        document.getElementById('syncStatus').textContent = ' ✅ gespeichert';
      } catch (e) {
        console.error(e);
        document.getElementById('syncStatus').textContent = ' ❌ Speicherfehler';
        alert('Fehler beim Speichern. Seite wird neu geladen.');
        location.reload();
      }
    }

    async function manuellSynchronisieren() {
      await datenLaden();
    }

    function initialisiereStandardDaten() {
      lokaleDaten = {
        aufgaben: [
          { id: genId(), text: 'Sie ungestört lange ausschlafen lassen, Kinder/Frühstück übernehmen', punkte: 6, status: 'offen' },
          { id: genId(), text: 'Frühstück ans Bett bringen (inkl. Blume, Briefchen)', punkte: 5, status: 'offen' },
          { id: genId(), text: 'Küche komplett aufräumen + saugen', punkte: 8, status: 'offen' },
          { id: genId(), text: 'Ein warmes Bad vorbereiten (Kerzen, Musik, Getränk)', punkte: 12, status: 'offen' },
          { id: genId(), text: '30-Minuten-Massage (ohne sexuelle Erwartung)', punkte: 15, status: 'offen' },
          { id: genId(), text: 'Liebesbrief oder erotische Notiz hinterlassen', punkte: 4, status: 'offen' },
          { id: genId(), text: 'Einen Date-Abend planen (Restaurant/Kino reservieren)', punkte: 10, status: 'offen' },
          { id: genId(), text: 'Ihr Lieblingsessen kochen und servieren', punkte: 10, status: 'offen' },
          { id: genId(), text: 'Fußmassage nach einem langen Tag', punkte: 6, status: 'offen' },
          { id: genId(), text: 'Spontan eine Hausarbeit abnehmen, die sie sonst macht', punkte: 8, status: 'offen' },
          { id: genId(), text: 'Gemeinsamen Ausflug komplett organisieren', punkte: 25, status: 'offen' },
          { id: genId(), text: 'Überraschungs-Picknick', punkte: 20, status: 'offen' },
          { id: genId(), text: 'Einen ganzen Tag lang nur für sie da sein', punkte: 30, status: 'offen' },
          { id: genId(), text: 'Die gesamte Wohnung saugen und wischen', punkte: 12, status: 'offen' },
          { id: genId(), text: 'Badezimmer komplett putzen', punkte: 15, status: 'offen' }
        ],
        einloesungen: [
          { id: genId(), text: 'Gemeinsam einen Porno ansehen (sie sucht mit aus)', kosten: 10, hinweis: '' },
          { id: genId(), text: 'Sie holt ihm einen runter (Handjob)', kosten: 15, hinweis: '' },
          { id: genId(), text: 'Sie gibt ihm einen Blowjob (bis zum Höhepunkt)', kosten: 25, hinweis: '' },
          { id: genId(), text: 'Sie begleitet ihn ins Freibad (auch wenn sie keine Lust hat)', kosten: 20, hinweis: '' },
          { id: genId(), text: 'Geschlechtsverkehr nach seinen Vorlieben (Stellung, Tempo)', kosten: 40, hinweis: '' },
          { id: genId(), text: 'Ein kompletter Verwöhnabend für ihn (Bad, Massage, Oralsex, Sex)', kosten: 80, hinweis: '' },
          { id: genId(), text: 'Sie flirtet in seiner Anwesenheit mit einem anderen Mann', kosten: 120, hinweis: '⚠️ Bitte überdenken – Regeln und Safeword vorher festlegen' },
          { id: genId(), text: 'Sie hat Sex mit einem anderen Mann', kosten: 300, hinweis: '⚠️⚠️ Nur bei absolutem Einverständnis und klaren Absprachen' }
        ],
        konto: 0,
        log: []
      };
    }

    function genId() { return Date.now().toString(36) + Math.random().toString(36).substr(2); }

    // ==================== RENDERING ====================
    function renderAlles() {
      document.getElementById('kontoAnzeige').textContent = (lokaleDaten.konto || 0) + ' Punkte';
      renderAufgaben();
      renderEinloesungen();
      renderLog();
    }

    function renderAufgaben() {
      const tbody = document.getElementById('aufgabenBody');
      tbody.innerHTML = '';
      (lokaleDaten.aufgaben || []).forEach(a => {
        tbody.innerHTML += `
          <tr>
            <td><span class="editable-cell" data-id="${a.id}" data-field="text" data-typ="aufgabe">${esc(a.text)}</span></td>
            <td><span class="punkte-badge editable-cell" data-id="${a.id}" data-field="punkte" data-typ="aufgabe">${a.punkte||0}</span></td>
            <td>${statusBadge(a.status)}</td>
            <td class="flex">
              ${a.status === 'offen' ? `<button onclick="erledigt('${a.id}')">✅ Erledigt</button>` : ''}
              ${a.status === 'erledigt_unbewertet' ? `<button onclick="bewerten('${a.id}')">⭐ Bewerten</button>` : ''}
              ${a.status === 'bewertet' ? `<span style="color:var(--green)">+${a.vergebenePunkte||a.punkte} P.</span>` : ''}
              <button style="background:#555;" onclick="loeschen('${a.id}','aufgabe')">🗑</button>
            </td>
          </tr>`;
      });
      editableAktivieren();
    }

    function renderEinloesungen() {
      const tbody = document.getElementById('einloesungenBody');
      tbody.innerHTML = '';
      (lokaleDaten.einloesungen || []).forEach(e => {
        let warn = '';
        if (e.text && (e.text.includes('anderen Mann') || e.text.includes('Sex mit anderem'))) {
          warn = '<br><span class="warning">⚠️ Bitte überdenken – Safeword und Regeln vorher besprechen</span>';
        }
        tbody.innerHTML += `
          <tr>
            <td><span class="editable-cell" data-id="${e.id}" data-field="text" data-typ="einloesung">${esc(e.text)}</span>${warn}</td>
            <td><span class="punkte-badge editable-cell" data-id="${e.id}" data-field="kosten" data-typ="einloesung">${e.kosten||0}</span></td>
            <td>${esc(e.hinweis||'')}</td>
            <td class="flex">
              <button onclick="einloesen('${e.id}')" ${(lokaleDaten.konto||0) < (e.kosten||0) ? 'disabled' : ''}>💰 Einlösen</button>
              <button style="background:#555;" onclick="loeschen('${e.id}','einloesung')">🗑</button>
            </td>
          </tr>`;
      });
      editableAktivieren();
    }

    function renderLog() {
      const container = document.getElementById('logContainer');
      container.innerHTML = '';
      (lokaleDaten.log || []).slice().reverse().slice(0,20).forEach(e => {
        container.innerHTML += `<div class="log-entry">[${e.time}] ${e.text}</div>`;
      });
      if (container.innerHTML === '') container.textContent = 'Keine Einträge';
    }

    function statusBadge(status) {
      if (status === 'offen') return '🔵 Offen';
      if (status === 'erledigt_unbewertet') return '🟡 Wartet auf Bewertung';
      if (status === 'bewertet') return '🟢 Punkte vergeben';
      return status;
    }

    function esc(text) { return String(text).replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[m]); }

    function editableAktivieren() {
      document.querySelectorAll('.editable-cell').forEach(cell => {
        cell.contentEditable = 'true';
        cell.onblur = speichereEdit;
        cell.onkeydown = (e) => { if (e.key === 'Enter') { e.preventDefault(); cell.blur(); } };
      });
    }

    // ==================== AKTIONEN ====================
    function erledigt(id) {
      const a = lokaleDaten.aufgaben.find(x => x.id === id);
      if (!a) return;
      a.status = 'erledigt_unbewertet';
      log(`Ehemann meldet „${a.text}“ erledigt.`);
      datenSpeichern().then(renderAlles);
    }

    function bewerten(id) {
      const a = lokaleDaten.aufgaben.find(x => x.id === id);
      if (!a) return;
      const vorschlag = a.punkte || 5;
      const eingabe = prompt(`Punkte für „${a.text}“? (Vorschlag: ${vorschlag})`, vorschlag);
      if (eingabe === null) return;
      const punkte = parseInt(eingabe);
      if (isNaN(punkte) || punkte < 0) return;
      a.status = 'bewertet';
      a.vergebenePunkte = punkte;
      lokaleDaten.konto = (lokaleDaten.konto || 0) + punkte;
      log(`Frau vergibt ${punkte} Punkte für „${a.text}“.`);
      datenSpeichern().then(renderAlles);
    }

    function einloesen(id) {
      const e = lokaleDaten.einloesungen.find(x => x.id === id);
      if (!e || (lokaleDaten.konto||0) < (e.kosten||0)) return;
      if (e.text && (e.text.includes('anderen Mann') || e.text.includes('Sex mit anderem'))) {
        if (!confirm('⚠️ Kritische Einlösung! Seid ihr euch absolut einig und habt alle Regeln besprochen? Fortfahren?')) return;
      }
      if (!confirm(`„${e.text}“ für ${e.kosten} Punkte einlösen?`)) return;
      lokaleDaten.konto -= e.kosten;
      log(`Ehemann löst ein: „${e.text}“ (${e.kosten} P.).`);
      datenSpeichern().then(renderAlles);
    }

    function speichereEdit(e) {
      const cell = e.target;
      const id = cell.dataset.id;
      const field = cell.dataset.field;
      const typ = cell.dataset.typ;
      const wert = cell.textContent.trim();
      if (!id || !field) return;
      const liste = typ === 'aufgabe' ? lokaleDaten.aufgaben : lokaleDaten.einloesungen;
      const eintrag = liste.find(x => x.id === id);
      if (!eintrag) return;
      if (field === 'punkte' || field === 'kosten') {
        eintrag[field] = parseInt(wert) || 0;
      } else {
        eintrag[field] = wert;
      }
      log(`Wert von „${eintrag.text||eintrag.id}“ bearbeitet.`);
      datenSpeichern().then(renderAlles);
    }

    function loeschen(id, typ) {
      if (!confirm('Wirklich löschen?')) return;
      if (typ === 'aufgabe') lokaleDaten.aufgaben = lokaleDaten.aufgaben.filter(x => x.id !== id);
      else lokaleDaten.einloesungen = lokaleDaten.einloesungen.filter(x => x.id !== id);
      log(`Eintrag gelöscht.`);
      datenSpeichern().then(renderAlles);
    }

    function neuenEintragHinzufuegen() {
      const typ = document.getElementById('neuerTyp').value;
      const text = document.getElementById('neuerText').value.trim();
      const punkte = parseInt(document.getElementById('neuerPunkte').value) || 0;
      if (!text) { alert('Text fehlt'); return; }
      if (typ === 'aufgabe') {
        lokaleDaten.aufgaben.push({ id: genId(), text, punkte, status: 'offen' });
      } else {
        lokaleDaten.einloesungen.push({ id: genId(), text, kosten: punkte, hinweis: '' });
      }
      document.getElementById('neuerText').value = '';
      log(`Neuer Eintrag: ${text}`);
      datenSpeichern().then(renderAlles);
    }

    function log(text) {
      if (!lokaleDaten.log) lokaleDaten.log = [];
      lokaleDaten.log.push({ text, time: new Date().toLocaleString('de-DE') });
    }

    function switchTab(name) {
      document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + name).style.display = 'block';
      event.target.classList.add('active');
    }

    // Start
    datenLaden();
  </script>
</body>
</html>
